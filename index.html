<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XCPBK0GWJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5XCPBK0GWJ');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="i18n-title" content="site.title">
  <title>Oniro Item DB - 오니로 아이템 데이터베이스</title>
  <meta name="description" content="Oniro ARPG 아이템 데이터베이스 - 무기, 방어구, 장신구 등 600+ 전설 아이템 검색, 필터, 상세 스탯 확인 및 유저 평가">
  <meta name="keywords" content="Oniro, 오니로, ARPG, 아이템, 데이터베이스, 무기, 방어구, 장신구, 액션RPG, 핵앤슬래시">
  <meta name="author" content="Oniro Item DB">
  <meta name="theme-color" content="#121220">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Oniro Item DB - 오니로 아이템 데이터베이스">
  <meta property="og:description" content="Oniro ARPG 아이템 데이터베이스 - 600+ 전설 아이템 검색, 상세 스탯, 유저 평가 시스템">
  <meta property="og:image" content="https://jjinbbang2.github.io/oniro/img/og-image.svg">
  <meta property="og:url" content="https://jjinbbang2.github.io/oniro/">
  <meta property="og:site_name" content="Oniro Item DB">
  <meta property="og:locale" content="ko_KR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Oniro Item DB - 오니로 아이템 데이터베이스">
  <meta name="twitter:description" content="Oniro ARPG 아이템 데이터베이스 - 600+ 전설 아이템 검색, 상세 스탯, 유저 평가">
  <meta name="twitter:image" content="https://jjinbbang2.github.io/oniro/img/og-image.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="apple-touch-icon" href="img/favicon.svg">

  <link rel="stylesheet" href="css/reset.css?v=3.2.0">
  <link rel="stylesheet" href="css/variables.css?v=3.2.0">
  <link rel="stylesheet" href="css/layout.css?v=3.2.0">
  <link rel="stylesheet" href="css/components.css?v=3.2.0">
  <link rel="stylesheet" href="css/item-detail.css?v=3.2.0">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <img src="img/favicon.svg" alt="Oniro" class="site-logo-icon" width="28" height="28">
      <h1 class="site-logo">Oniro Item DB</h1>
      <span class="site-version">v1.4.4</span>
      <nav class="main-tabs">
        <a class="main-tab active" href="/item/" data-i18n="nav.items">장비목록</a>
        <a class="main-tab" href="/item/weapons/" data-i18n="nav.weapons">무기</a>
        <!-- <a class="main-tab" href="/item/guide/" data-i18n="nav.guide">가이드</a> -->
      </nav>
      <div class="lang-selector" id="langSelector"></div>
    </div>
  </header>

  <main class="main-content">

    <!-- Search Bar -->
    <section class="search-section">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="아이템 이름 검색 (한글/영문)"
          data-i18n-placeholder="search.placeholder"
          autocomplete="off"
        >
        <button id="searchClear" class="search-clear" hidden aria-label="검색어 지우기" data-i18n-aria="search.clear">&times;</button>
      </div>
    </section>

    <!-- Category Tabs -->
    <nav class="category-tabs" aria-label="아이템 카테고리" data-i18n-aria="category.label">
      <button class="tab active" data-cat="all"><span data-i18n="cat.all">전체</span><span class="tab-count"></span></button>
      <button class="tab" data-cat="무기"><span data-i18n="cat.weapon">무기</span><span class="tab-count"></span></button>
      <button class="tab" data-cat="방어구"><span data-i18n="cat.armor">방어구</span><span class="tab-count"></span></button>
      <button class="tab" data-cat="장신구"><span data-i18n="cat.accessory">장신구</span><span class="tab-count"></span></button>
      <button class="tab" data-cat="보조"><span data-i18n="cat.offhand">보조</span><span class="tab-count"></span></button>
    </nav>

    <!-- Filters -->
    <section class="filter-section">
      <div class="filter-row">
        <!-- Type Filter -->
        <div class="filter-group">
          <button class="filter-toggle" id="typeToggle">
            <span data-i18n="filter.type">타입</span> <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="filter-dropdown" id="typeDropdown" hidden>
            <div class="filter-tags" id="typeTags"></div>
          </div>
        </div>

        <!-- Subtype Filter -->
        <div class="filter-group">
          <button class="filter-toggle" id="subtypeToggle">
            <span data-i18n="filter.subtype">세부타입</span> <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="filter-dropdown" id="subtypeDropdown" hidden>
            <div class="filter-tags" id="subtypeTags"></div>
          </div>
        </div>

        <!-- Option Filter -->
        <div class="filter-group">
          <button class="filter-toggle" id="optionToggle">
            <span data-i18n="filter.option">옵션</span> <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="filter-dropdown filter-dropdown-search" id="optionDropdown" hidden>
            <input type="text" class="filter-search" id="optionSearch" placeholder="옵션 검색..." data-i18n-placeholder="filter.optionSearch" autocomplete="off">
            <div class="filter-tags filter-tags-scroll" id="optionTags"></div>
          </div>
        </div>

        <!-- Skill Filter -->
        <div class="filter-group">
          <button class="filter-toggle" id="skillToggle">
            <span data-i18n="filter.skill">스킬</span> <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="filter-dropdown filter-dropdown-search" id="skillDropdown" hidden>
            <input type="text" class="filter-search" id="skillSearch" placeholder="스킬 검색..." data-i18n-placeholder="filter.skillSearch" autocomplete="off">
            <div class="filter-tags filter-tags-scroll" id="skillTags"></div>
          </div>
        </div>

        <!-- Level Range -->
        <div class="filter-group filter-level">
          <label data-i18n="filter.level">레벨</label>
          <input type="number" id="lvMin" class="level-input" placeholder="최소" data-i18n-placeholder="filter.lvMin" min="1">
          <span class="level-sep">~</span>
          <input type="number" id="lvMax" class="level-input" placeholder="최대" data-i18n-placeholder="filter.lvMax" min="1">
        </div>
      </div>

      <!-- Active Filters Display -->
      <div class="active-filters" id="activeFilters" hidden>
        <span class="active-filters-label" data-i18n="filter.label">필터:</span>
        <div class="active-filters-list" id="activeFiltersList"></div>
        <button class="active-filters-clear" id="clearAllFilters" data-i18n="filter.clearAll">전체 해제</button>
      </div>
    </section>

    <!-- Result Info & Sort -->
    <section class="result-bar">
      <span class="result-count" id="resultCount" data-i18n="result.loading">로딩 중...</span>
      <div class="sort-controls">
        <label class="sort-label" for="sortSelect" data-i18n="sort.label">정렬</label>
        <select id="sortSelect" class="sort-select">
          <option value="level-desc" data-i18n="sort.levelDesc">레벨 높은순</option>
          <option value="level-asc" data-i18n="sort.levelAsc">레벨 낮은순</option>
          <option value="name-asc" data-i18n="sort.nameAsc">이름 가나다순</option>
          <option value="name-desc" data-i18n="sort.nameDesc">이름 역순</option>
          <option value="rating-desc" data-i18n="sort.ratingDesc">별점 높은순</option>
          <option value="rating-asc" data-i18n="sort.ratingAsc">별점 낮은순</option>
          <option value="id-asc" data-i18n="sort.idAsc">ID 순</option>
        </select>
        <label class="sort-label" for="perPageSelect" data-i18n="display.label">표시</label>
        <select id="perPageSelect" class="sort-select">
          <option value="30" data-i18n="display.30">30개</option>
          <option value="50" data-i18n="display.50">50개</option>
          <option value="100" data-i18n="display.100">100개</option>
        </select>
      </div>
    </section>

    <!-- Item Table -->
    <section class="table-section">
      <div class="table-wrapper">
        <table class="item-table" id="itemTable">
          <thead>
            <tr>
              <th class="col-level" data-i18n="table.level">레벨</th>
              <th class="col-name" data-i18n="table.item">아이템</th>
              <th class="col-type" data-i18n="table.type">타입</th>
              <th class="col-subtype" data-i18n="table.subtype">세부</th>
              <th class="col-rating" data-i18n="table.rating">별점</th>
              <th class="col-options" data-i18n="table.options">주요 옵션</th>
              <th class="col-skills" data-i18n="table.skills">주요 스킬</th>
            </tr>
          </thead>
          <tbody id="itemTableBody">
          </tbody>
        </table>
      </div>

      <!-- Loading -->
      <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p data-i18n="result.dataLoading">데이터 로딩 중...</p>
      </div>

      <!-- No Results -->
      <div class="no-results" id="noResults" hidden>
        <p data-i18n="result.noResults">검색 결과가 없습니다.</p>
      </div>
    </section>

    <!-- Pagination -->
    <nav class="pagination" id="pagination" aria-label="페이지 이동" data-i18n-aria="pagination.label">
    </nav>
  </main>

  <!-- Item Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="itemModal" role="dialog" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="닫기" data-i18n-aria="modal.close">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Scripts -->
  <script type="module" src="js/app.js?v=3.2.0"></script>
</body>
</html>
